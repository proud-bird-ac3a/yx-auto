name: Auto IP Collector

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'  # 每4小时运行一次

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4

      - name: 🧠 Step 1 - Collect raw IPs
        run: python collect_raw.py

      - name: 🌍 Step 2 - Detect country & city, generate final lists
        run: python detect.py

      - name: 📤 Commit and push IP results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ipv4.txt ipv6.txt
          git diff --cached --quiet || git commit -m "Update IP lists at $(TZ=UTC-8 date +'%Y-%m-%d %H:%M:%S')"
          git push
